<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS GCSE Hub</title>
  <link rel="stylesheet" href="style.css?v=5">
</head>

<body onload="initApp()">

  <!-- Sidebar Navigation -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <a href="#" onclick="loadContent('home')" class="nav-link active" data-page="home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
        <span>Dashboard</span>
      </a>

      <a href="#" onclick="loadContent('visualizations')" class="nav-link sub-nav-link" data-page="visualizations">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10" />
          <line x1="12" y1="20" x2="12" y2="4" />
          <line x1="6" y1="20" x2="6" y2="14" />
        </svg>
        <span>Visualizations</span>
      </a>
      <a href="#" onclick="toggleSubMenu('flashcards-sub')" class="nav-link sub-nav-link"
        style="justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 12px;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="14" rx="2" />
            <rect x="4" y="4" width="16" height="14" rx="2" />
            <rect x="6" y="2" width="12" height="14" rx="2" />
          </svg>
          <span>Flashcards</span>
        </div>
        <span style="font-size: 0.7rem; opacity: 0.7;">▼</span>
      </a>

      <div id="flashcards-sub" class="submenu">
        <a href="#" onclick="loadContent('p1_revision')" class="nav-link"
          style="padding-left: 55px; font-size: 0.8rem;">
          <span>Paper 1 Flashcards</span>
        </a>
        <a href="#" onclick="loadContent('p2_revision')" class="nav-link"
          style="padding-left: 55px; font-size: 0.8rem;">
          <span>Paper 2 Flashcards</span>
        </a>
      </div>


      <a href="#" onclick="loadContent('quiz_trainer')" class="nav-link" data-page="quiz_trainer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" />
          <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
          <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        <span>Quiz Trainer</span>
      </a>
      <a href="#" onclick="loadContent('connecting_walls')" class="nav-link" data-page="connecting_walls">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>
        <span>Connecting Walls</span>
      </a>
      <a href="#" onclick="loadContent('parsons_puzzles')" class="nav-link" data-page="parsons_puzzles">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 18 22 12 16 6" />
          <polyline points="8 6 2 12 8 18" />
        </svg>
        <span>Parson's Puzzles</span>
      </a>
      <a href="#" onclick="loadContent('logic_gate_lab')" class="nav-link" data-page="logic_gate_lab">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="16" height="16" rx="2" />
          <line x1="9" y1="9" x2="9.01" y2="9" />
          <line x1="15" y1="9" x2="15.01" y2="9" />
          <line x1="9" y1="15" x2="9.01" y2="15" />
          <line x1="15" y1="15" x2="15.01" y2="15" />
        </svg>
        <span>Logic Gate Lab</span>
      </a>
      <a href="#" onclick="loadContent('binary_boss')" class="nav-link" data-page="binary_boss">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 17.5L3 6V3h3l11.5 11.5" />
          <path d="M13 7.5l4-4 4 4-4 4" />
          <path d="M7.5 13l-4 4 4 4 4-4" />
        </svg>
        <span>Binary Boss Battle</span>
      </a>
    </div>
    <div class="sidebar-achievements">
      <div class="achievements-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" />
          <path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" />
          <path d="M4 22h16" />
          <path d="M10 22V8a2 2 0 0 0-2-2H6v6.7a5 5 0 0 0 3.5 4.8L12 18" />
          <path d="M14 22V8a2 2 0 0 1 2-2h2v6.7a5 5 0 0 1-3.5 4.8L12 18" />
        </svg>
        <span>ACHIEVEMENTS</span>
      </div>
      <div class="achievement-row"><span>Quizzes</span><span id="ach-quizzes" class="ach-count">0</span></div>
      <div class="achievement-row"><span>Walls</span><span id="ach-walls" class="ach-count">0</span></div>
      <div class="achievement-row"><span>Bosses</span><span id="ach-bosses" class="ach-count">0</span></div>
    </div>
  </nav>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Top Header -->
    <header class="navbar">
      <div class="navbar-left">
        <button class="menu-btn" id="menu-btn" onclick="toggleMobileNav()">
          <div class="bar"></div>
          <div class="bar"></div>
          <div class="bar"></div>
        </button>
        <div class="logo-container" onclick="loadContent('home')" style="cursor:pointer;">
          <span class="logo-badge">CS</span>
          <span class="logo-text">GCSE Hub</span>
        </div>
      </div>

      <div class="search-container">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="global-search" placeholder="Search topics, terms..." oninput="handleSearch()">
        <div id="search-results" class="search-dropdown"></div>
      </div>

      <div class="header-stats">
        <div class="stat-streak" title="Day Streak">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2c1 3-2 6-2 6s3-1 4 2c1 3-2 6-2 6s3-1 3 3H9c0-4 2-3 3-6s-3-3-2-6c1-3 2-5 2-5z" />
          </svg>
          <span id="streak-count">0</span>
        </div>
        <div class="stat-rank">
          <span class="rank-letter" id="rank-badge">F</span>
        </div>
        <div class="stat-level">
          <span class="level-text">Lv.<span id="level-num">1</span></span>
          <div class="xp-bar-mini">
            <div class="xp-bar-fill" id="xp-bar-fill" style="width: 0%"></div>
          </div>
        </div>
        <button id="theme-toggle" onclick="toggleDarkMode()" title="Toggle Dark Mode">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main id="main-content">
      <div id="display-area"></div>
    </main>
  </div>

  <button id="smart-back-btn" class="smart-back floating-btn" onclick="goBack()">
    <span class="icon">&#x2190;</span>
    <span class="tooltip" id="back-tooltip">Go Back</span>
  </button>

  <script src="script.js?v=8"></script>
</body>

</html>
